<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSE519: Data Science Fundamentals</title>

  <link rel="stylesheet" href="styles.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="background-glow"></div>

<div class="container">

  <header class="hero">

    <div class="branding">
      <img src="logo.png" class="sbu-logo">

      <div>
        <p class="uni-name">Stony Brook University</p>
        <h1>CSE519: Data Science Fundamentals</h1>
      </div>
    </div>

    <p class="subtitle">
      Practice quizzes for core data science concepts.
      One question at a time because educational suffering apparently benefits retention.
    </p>

  </header>

  <section id="home-screen">

    <div class="section-header">
      <h2>Select a Topic</h2>
      <p>Choose your academic damage carefully.</p>
    </div>

    <div id="topics-container"></div>

  </section>

  <section id="quiz-screen" class="hidden">

    <div class="quiz-top">
      <div>
        <h2 id="quiz-title"></h2>
        <p id="progress"></p>
      </div>

      <button id="back-btn" class="secondary-btn">Back</button>
    </div>

    <div class="question-card">

      <h3 id="question-text"></h3>

      <div id="choices-container"></div>

      <div class="button-row">
        <button id="submit-btn">Submit Answer</button>
        <button id="next-btn" class="hidden">Next Question</button>
      </div>

      <div id="feedback"></div>

    </div>

  </section>

  <section id="results-screen" class="hidden">

    <h2>Quiz Results</h2>

    <p id="score-text"></p>

    <div id="wrong-answers"></div>

    <button id="restart-btn">Return To Topics</button>

  </section>
<footer class="footer">
  Developed by
  <a href="https://github.com/Yuvaraaj-Shaan-Rajput" target="_blank">
    Aviral Chanchal
  </a>
</footer>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
